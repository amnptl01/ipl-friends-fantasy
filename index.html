<!DOCTYPE html>
<html>
<head>

<title>IPL Fantasy Friends</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:10px;
border:none;
border-radius:6px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:12px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:8px;
}

button{
background:#f97316;
border:none;
padding:12px 20px;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

.section{
margin-top:30px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#1e293b;
margin:6px 0;
padding:8px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
IPL Fantasy League
</header>

<div class="container">

<div class="controls">

<input id="search" placeholder="Search Player">

<select id="teamFilter">

<option value="ALL">All Teams</option>
<option value="CSK">CSK</option>
<option value="MI">MI</option>
<option value="RCB">RCB</option>
<option value="KKR">KKR</option>
<option value="SRH">SRH</option>
<option value="GT">GT</option>
<option value="RR">RR</option>
<option value="DC">DC</option>
<option value="PBKS">PBKS</option>
<option value="LSG">LSG</option>

</select>

</div>

<h2>Select Players (Max 11)</h2>

<div class="players" id="players"></div>

<br>

<button onclick="saveTeam()">Save Team</button>

<div class="section">

<h2>Your Team</h2>

<ul id="team"></ul>

</div>

<div class="section">

<h2>Captain</h2>
<select id="captain"></select>

<h2>Vice Captain</h2>
<select id="vice"></select>

</div>

<div class="section">

<h2>Leaderboard</h2>

<ul id="leaderboard"></ul>

</div>

</div>

const playersDiv=document.getElementById("players")

function renderPlayers(){

playersDiv.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let team=document.getElementById("teamFilter").value

players.forEach(p=>{

if(
p[0].toLowerCase().includes(search) &&
(team==="ALL" || p[1]===team)
){

let div=document.createElement("div")

div.className="card"

div.innerHTML=`
<label>
<input type="checkbox" value="${p[0]}">
${p[0]} (${p[1]})
</label>
`

playersDiv.appendChild(div)

}

})

}

document.getElementById("search").oninput=renderPlayers
document.getElementById("teamFilter").onchange=renderPlayers
